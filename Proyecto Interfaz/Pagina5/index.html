<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Panel del Maestro</title>
  <link rel="icon" type="image/png" href="../imagen/Logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="hero-cubes-bg">
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
    <div class="cube"></div>
  </div>
  <div class="layout">
    <aside class="side-nav">
      <div class="profile">
        <div class="profile-image">
          <img id="teacherProfileImageSide" src="https://via.placeholder.com/110" alt="Perfil Maestro">
        </div>
        <h3 id="teacherNameSide">Profesor</h3>
        <span class="role-badge">Panel del Maestro</span>
      </div>
      <nav>
        <ul>
          <li><a href="index.html" class="active"><i class="fas fa-home"></i> Inicio</a></li>
          <li><a href="avisos.html"><i class="fas fa-bullhorn"></i> Avisos</a></li>
          <li><a href="#" id="navMensajes"><i class="fas fa-envelope"></i> Mensajes</a></li>
        </ul>
      </nav>
    </aside>
    <div class="main-area">
  <header>
    <div class="header-left">
      <h1>Panel del Maestro</h1>
      <p id="welcomeText">Ver y evaluar tus grupos</p>
    </div>
    <div class="header-actions">
      <button id="showGroupsBtn" class="primary">Mis Clases</button>
      <div class="messages-tabs">
        <button id="showStudentMessagesBtn" class="secondary messages-tab active">Estudiantes <span id="badgeStudentMsgs" class="badge" style="display:none;">0</span></button>
        <button id="showAdminMessagesBtn" class="secondary messages-tab">Administración <span id="badgeAdminMsgs" class="badge" style="display:none;">0</span></button>
      </div>
  <button id="refreshMessagesBtn" class="secondary" title="Actualizar lista de mensajes" style="display:none;">Actualizar</button>
      <button id="logoutBtn" class="secondary">Cerrar Sesión</button>
      <div class="avatar" id="teacherAvatar" title="Cambiar foto">
        <img id="teacherProfileImage" src="https://via.placeholder.com/80" alt="Foto del maestro">
        <div class="avatar-overlay"><span class="camera">📷</span></div>
      </div>
      <input type="file" id="teacherPhotoInput" accept="image/*" style="display:none">
    </div>
  </header>
  <main>
    <section class="app-shell">
      <aside class="sidebar">
        <div class="side-header">
          <strong>Tus grupos</strong>
          <div>
            <button id="addGroup" style="display:none">+</button>
            <button id="exportPdf">PDF</button>
          </div>
        </div>
        <div id="groupsList" class="groups-list"></div>
      </aside>
      <section class="panel">
        <div class="panel-header">
          <h2 id="groupTitle">Selecciona un grupo</h2>
          <div class="panel-actions">
            <button id="downloadPdfBtn" class="primary" disabled>Descargar PDF</button>
            <button id="downloadExcelBtn" class="secondary" disabled>Descargar Excel</button>
          </div>
        </div>
        <div id="panelBody" class="panel-body">
          <p class="muted">Selecciona un grupo en la columna izquierda para ver sus alumnos y evaluarlos.</p>
        </div>
      </section>
    </section>
  </main>
    </div>
  </div>
  <template id="groupItemTpl">
    <li class="group-item">
      <span class="name"></span>
      <div class="actions">
        <button class="edit">✎</button>
        <button class="delete">✖</button>
      </div>
    </li>
  </template>
  <template id="studentItemTpl">
    <li class="student-item">
      <div class="left">
        <span class="name"></span>
        <small class="meta"></small>
      </div>
      <div class="evaluate">
        <input class="score" type="number" min="0" max="100" placeholder="Nota">
        <button class="saveScore">Guardar</button>
      </div>
    </li>
  </template>
  <template id="assignmentItemTpl">
    <li>
      <span class="text"></span>
      <div class="actions">
        <button class="remove">Eliminar</button>
      </div>
    </li>
  </template>
  <!-- jsPDF CDN para exportar a PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- jsPDF AutoTable para tablas elegantes en PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <!-- SheetJS para exportar a Excel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Navegación: ir a mensajes activando pestañas
    document.getElementById('navMensajes')?.addEventListener('click', function(e){
      e.preventDefault();
      // Simula click en pestaña de Estudiantes por defecto
      document.getElementById('showStudentMessagesBtn')?.click();
      // Scroll a cabecera para que se vea el cambio de vista
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
