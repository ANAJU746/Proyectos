<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar Evento</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Pacifico&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background: url('fondo7.jpg') no-repeat center center fixed;
            background-color: #ffebee;
            margin: 0;
            padding: 0;
            color: #000; /* Cambiar el color de la letra a negro */
            overflow-x: hidden;
        }
        header {
            background-color: #d32f2f;
            color: #ffebee;
            text-align: center;
            padding: 1em 0;
            font-size: 2em;
            border-bottom: 4px solid #b71c1c;
            animation: fadeInDown 1s;
        }
        .container {
            max-width: 800px;
            margin: 2em auto;
            padding: 1em;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            animation: fadeInUp 1s;
        }
        h1 {
            font-family: 'Pacifico', cursive;
            color: #000; /* Cambiar el color del título a negro */
        }
        h2 {
            color: #d32f2f;
        }
        .form-group {
            margin-bottom: 1em;
            animation: fadeIn 1s;
        }
        label {
            display: block;
            margin-bottom: 0.5em;
            color: #000; /* Cambiar el color de la letra a negro */
        }
        input, textarea, select {
            width: 100%;
            padding: 0.5em;
            border: 1px solid #ccc;
            border-radius: 4px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #d32f2f;
        }
        button {
            background-color: #d32f2f;
            color: white;
            padding: 0.75em 1.5em;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s, transform 0.3s;
        }
        button:hover {
            background-color: #b71c1c;
            transform: scale(1.05);
        }
        .details {
            display: none;
            margin-top: 1em;
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Actualizar Evento</h1>
    </header>
    <div class="container">
        <h2>Seleccionar Evento</h2>
        <div class="form-group">
            <label for="selectEvent">Selecciona un Evento</label>
            <select id="selectEvent" onchange="mostrarDetalles()">
                <option value="">--Selecciona un Evento--</option>
                <!-- Opciones generadas dinámicamente -->
            </select>
        </div>
        <div id="eventDetails" class="details">
            <h2>Actualizar Evento</h2>
            <form id="updateForm">
                <div class="form-group">
                    <label for="eventName">Nombre del Evento</label>
                    <input type="text" id="eventName" name="eventName" required>
                </div>
                <div class="form-group">
                    <label for="eventDate">Fecha del Evento</label>
                    <input type="date" id="eventDate" name="eventDate" required>
                </div>
                <div class="form-group">
                    <label for="eventDescription">Descripción del Evento</label>
                    <textarea id="eventDescription" name="eventDescription" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="eventType">Tipo de Evento</label>
                    <select id="eventType" name="eventType" required>
                        <option value="conferencia">Conferencia</option>
                        <option value="taller">Taller</option>
                        <option value="seminario">Seminario</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>
                <button type="submit">Guardar Cambios</button>
            </form>
        </div>
    </div>
    <script>
        // Ejemplo de datos de eventos
        const eventos = [
            { nombre: "Evento 1", tipo: "conferencia", fecha: "2023-10-01", descripcion: "Descripción del Evento 1" },
            { nombre: "Evento 2", tipo: "taller", fecha: "2023-10-05", descripcion: "Descripción del Evento 2" },
            // ...otros eventos...
        ];

        // Función para cargar eventos en el select
        function cargarEventos() {
            const select = document.getElementById("selectEvent");
            eventos.forEach((evento, index) => {
                const option = document.createElement("option");
                option.value = index;
                option.textContent = evento.nombre;
                select.appendChild(option);
            });
        }

        // Función para mostrar detalles del evento seleccionado
        function mostrarDetalles() {
            const select = document.getElementById("selectEvent");
            const index = select.value;
            if (index !== "") {
                const evento = eventos[index];
                document.getElementById("eventName").value = evento.nombre;
                document.getElementById("eventDate").value = evento.fecha;
                document.getElementById("eventDescription").value = evento.descripcion;
                document.getElementById("eventType").value = evento.tipo;
                document.getElementById("eventDetails").style.display = "block";
            } else {
                document.getElementById("eventDetails").style.display = "none";
            }
        }

        // Función para guardar cambios
        document.getElementById("updateForm").addEventListener("submit", function(event) {
            event.preventDefault();
            const index = document.getElementById("selectEvent").value;
            if (index !== "") {
                eventos[index].nombre = document.getElementById("eventName").value;
                eventos[index].fecha = document.getElementById("eventDate").value;
                eventos[index].descripcion = document.getElementById("eventDescription").value;
                eventos[index].tipo = document.getElementById("eventType").value;
                alert("Evento actualizado con éxito");
            }
        });

        // Cargar eventos al cargar la página
        cargarEventos();
    </script>
</body>
</html>
