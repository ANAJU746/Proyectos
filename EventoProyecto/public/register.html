<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Pacifico&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Lobster&display=swap');

    body {
      font-family: 'Roboto', sans-serif;
      background: url('fondo2.jpg') no-repeat center center fixed;
      background-size: cover;
      margin: 0;
      padding: 0;
      color: #000;
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }

    .welcome {
      font-family: 'Lobster', cursive;
      font-size: 4em;
      color: #d32f2f;
      margin-bottom: 0.5em;
      animation: highlight 2s infinite;
    }

    @keyframes highlight {
      0%, 100% { text-shadow: 0 0 10px rgba(211, 47, 47, 0.5); }
      50% { text-shadow: 0 0 20px rgba(211, 47, 47, 1); }
    }

    .container {
      width: 90%;
      max-width: 400px;
      padding: 2em;
      background-color: rgba(255, 255, 255, 0.9);
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
      border-radius: 16px;
      animation: fadeInUp 1s;
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      position: relative;
    }

    .container h1 {
      font-family: 'Pacifico', cursive;
      color: #000;
      margin-bottom: 1em;
      position: absolute;
      top: -1.5em;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(255, 255, 255, 0.9);
      padding: 0 1em;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .form-group {
      margin-bottom: 1.5em;
      animation: fadeIn 1s;
    }

    label {
      display: block;
      margin-bottom: 0.5em;
    }

    input {
      width: 100%;
      padding: 0.75em;
      border: 1px solid #ccc;
      border-radius: 8px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    input:focus {
      border-color: #d32f2f;
      box-shadow: 0 0 8px rgba(211, 47, 47, 0.5);
    }

    button {
      --c: #d32f2f;
      color: var(--c);
      font-size: 16px;
      border: 0.3em solid var(--c);
      border-radius: 0.5em;
      width: 100%;
      height: 3em;
      text-transform: uppercase;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-align: center;
      line-height: 3em;
      position: relative;
      overflow: hidden;
      z-index: 1;
      transition: 0.5s;
      margin-bottom: 1em;
      background-color: transparent;
    }

    button span {
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: var(--c);
      transform: translateY(150%);
      border-radius: 50%;
      left: 0;
      transition: 0.5s;
      transition-delay: calc((var(--n) - 1) * 0.1s);
      z-index: -1;
    }

    button:hover {
      color: black;
    }

    button:hover span {
      transform: translateY(0) scale(4);
    }

    button span:nth-child(1) { --n: 1; }
    button span:nth-child(2) { --n: 2; }
    button span:nth-child(3) { --n: 3; }
    button span:nth-child(4) { --n: 4; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="welcome">BIENVENIDO</div>
  <div class="container">
    <h1>Registro</h1>
    <form onsubmit="return registrarUsuario(event)">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" required />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required />
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirmar Contraseña</label>
        <input type="password" id="confirm-password" name="confirm-password" required />
      </div>
      <button type="submit">
        Registrar
        <span></span><span></span><span></span><span></span>
      </button>
    </form>
  </div>

  <script>
    function registrarUsuario(event) {
      event.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (password !== confirmPassword) {
        alert('Las contraseñas no coinciden');
        return;
      }

      fetch('http://localhost:8080/register.html', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      })
      .then(res => {
        if (res.ok) {
          alert('Registro exitoso');
          window.location.href = 'login.html';
        } else {
          alert('Error al registrar usuario');
        }
      })
      .catch(error => {
        console.error('Error de conexión:', error);
        alert('No se pudo conectar al servidor');
      });
    }
  </script>
</body>
</html>
