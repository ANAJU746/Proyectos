<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Pacifico&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Lobster&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background: url('fondo1.jpg') no-repeat center center fixed; /* Agregar fondo */
            background-size: cover; /* Ajustar el fondo para cubrir toda la pantalla */
            margin: 0;
            padding: 0;
            color: #000;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column; /* Añadir para centrar verticalmente */
        }
        header {
            display: none; /* Ocultar el header */
        }
        .container {
            width: 90%; /* Ajustar el ancho al 90% de la página */
            max-width: 400px;
            margin: 2em auto;
            padding: 2em;
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            animation: fadeInUp 1s;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            position: relative;
        }
        .container h1 {
            font-family: 'Pacifico', cursive;
            color: #000;
            margin-bottom: 1em;
            position: absolute;
            top: -1.5em;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.9);
            padding: 0 1em;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .form-group {
            margin-bottom: 1.5em;
            animation: fadeIn 1s;
        }
        label {
            display: block;
            margin-bottom: 0.5em;
            color: #000;
        }
        input {
            width: 100%;
            padding: 0.75em;
            border: 1px solid #ccc;
            border-radius: 8px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        input:focus {
            border-color: #d32f2f;
            box-shadow: 0 0 8px rgba(211, 47, 47, 0.5);
        }
        button {
            --c: #d32f2f;
            color: var(--c);
            font-size: 16px;
            border: 0.3em solid var(--c);
            border-radius: 0.5em;
            width: 100%;
            height: 3em;
            text-transform: uppercase;
            font-weight: bold;
            font-family: sans-serif;
            letter-spacing: 0.1em;
            text-align: center;
            line-height: 3em;
            position: relative;
            overflow: hidden;
            z-index: 1;
            transition: 0.5s;
            margin-bottom: 1em; /* Añadir margen inferior */
            background-color: transparent;
        }
        button span {
            position: absolute;
            width: 25%;
            height: 100%;
            background-color: var(--c); /* Cambiar el color de la burbuja a rojo */
            transform: translateY(150%);
            border-radius: 50%;
            left: calc((var(--n) - 1) * 25%);
            transition: 0.5s;
            transition-delay: calc((var(--n) - 1) * 0.1s);
            z-index: -1;
        }
        button:hover {
            color: black; /* Cambiar el color de las letras a negro */
        }
        button:hover span {
            transform: translateY(0) scale(4); /* Aumentar el tamaño de la burbuja para llenar el botón */
        }
        button span:nth-child(1) {
            --n: 1;
        }
        button span:nth-child(2) {
            --n: 2;
        }
        button span:nth-child(3) {
            --n: 3;
        }
        button span:nth-child(4) {
            --n: 4;
        }
        .register-btn {
            --c: #d32f2f; /* Cambiar el color de la burbuja a rojo */
        }
        .animated-words {
            font-size: 3em;
            color: white; /* Cambiar las letras a blanco */
            margin-bottom: 1em;
            text-align: center;
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Lobster', cursive;
            display: flex;
            gap: 1em;
            background-color: #d32f2f; /* Franja roja */
            padding: 0.5em 1em;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        .animated-words span {
            opacity: 1;
            animation: fadeInWords 1s forwards ease-in-out; /* Añadir ease-in-out para suavizar */
            text-transform: capitalize;
            transition: transform 0.3s ease-in-out, color 0.3s ease-in-out; /* Transición suave */
        }
        .animated-words span:hover {
            animation: none; /* Desactivar la animación al pasar el mouse */
            transform: scale(1.2); /* Aumentar tamaño al pasar el cursor */
            color: black; /* Cambiar el color a negro */
        }
        @keyframes highlight {
            0%, 100% { text-shadow: 0 0 10px rgba(211, 47, 47, 0.5); }
            50% { text-shadow: 0 0 20px rgba(211, 47, 47, 1); }
        }
        @keyframes highlight-hover {
            0% { color: red; }
            100% { color: black; }
        }
        .animated-words span:nth-child(1) {
            animation-delay: 0s;
        }
        .animated-words span:nth-child(2) {
            animation-delay: 0.5s;
        }
        .animated-words span:nth-child(3) {
            animation-delay: 1s;
        }
        .animated-words span:nth-child(4) {
            animation-delay: 1.5s;
        }
        @keyframes fadeInWords {
             0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @-webkit-keyframes ani {
            from {
                -webkit-mask-position: 0 0;
                mask-position: 0 0;
            }
            to {
                -webkit-mask-position: 100% 0;
                mask-position: 100% 0;
            }
        }
        @keyframes ani {
            from {
                -webkit-mask-position: 0 0;
                mask-position: 0 0;
            }
            to {
                -webkit-mask-position: 100% 0;
                mask-position: 100% 0;
            }
        }
        @-webkit-keyframes ani2 {
            from {
                -webkit-mask-position: 100% 0;
                mask-position: 100% 0;
            }
            to {
                -webkit-mask-position: 0 0;
                mask-position: 0 0;
            }
        }
        @keyframes ani2 {
            from {
                -webkit-mask-position: 100% 0;
                mask-position: 100% 0;
            }
            to {
                -webkit-mask-position: 0 0;
                mask-position: 0 0;
            }
        }
        .social-buttons {
            position: absolute;
            bottom: 1em;
            left: 1em;
            display: flex;
            gap: 0.5em;
        }
        .social-button {
            background-color: #d32f2f;
            color: #ffebee;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.3s;
        }
        .social-button:hover {
            background-color: #b71c1c;
            transform: scale(1.1);
        }
        .social-button svg {
            fill: #ffebee;
            width: 24px;
            height: 24px;
        }
        .error-message {
            color: red;
            font-size: 0.9em;
            margin-top: 0.5em;
            display: none; /* Ocultar inicialmente */
        }
    </style>
</head>
<body>
    <div class="animated-words">
        <span>Crea</span>
        <span>Organiza</span>
        <span>Planifica</span>
        <span>Automatiza</span>
    </div>
    <div class="container">
        <h1>Login</h1>
        <form onsubmit="return login(event)">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div id="error-message" class="error-message">Usuario o contraseña incorrectos</div> <!-- Mensaje de error -->
            <button type="submit">
                Ingresar
                <span></span><span></span><span></span><span></span>
            </button>
        </form>
        <button class="register-btn" onclick="window.location.href='register.html'">
            Registrarme
            <span></span><span></span><span></span><span></span>
        </button>
    </div>
    <div class="social-buttons">
        <button class="social-button" title="Facebook" onclick="window.location.href='https://www.facebook.com'">
            <svg viewBox="0 0 24 24">
                <path d="M17,2V2H17V6H15C14.31,6 14,6.81 14,7.5V10H14L17,10V14H14V22H10V14H7V10H10V6A4,4 0 0,1 14,2H17Z" />
            </svg>
        </button>
        <button class="social-button" title="Twitter" onclick="window.location.href='https://www.twitter.com'">
            <svg viewBox="0 0 24 24">
                <path d="M22.46,6C21.69,6.35 20.86,6.58 20,6.69C20.88,6.16 21.56,5.32 21.88,4.31C21.05,4.81 20.13,5.16 19.16,5.36C18.37,4.5 17.26,4 16,4C13.65,4 11.73,5.92 11.73,8.29C11.73,8.63 11.77,8.96 11.84,9.27C8.28,9.09 5.11,7.38 3,4.79C2.63,5.42 2.42,6.16 2.42,6.94C2.42,8.43 3.17,9.75 4.33,10.5C3.62,10.5 2.96,10.3 2.38,10C2.38,10 2.38,10 2.38,10.03C2.38,12.11 3.86,13.85 5.82,14.24C5.46,14.34 5.08,14.39 4.69,14.39C4.42,14.39 4.15,14.36 3.89,14.31C4.43,16 6,17.26 7.89,17.29C6.43,18.45 4.58,19.13 2.56,19.13C2.22,19.13 1.88,19.11 1.54,19.07C3.44,20.29 5.7,21 8.12,21C16,21 20.33,14.46 20.33,8.79C20.33,8.6 20.33,8.42 20.32,8.23C21.16,7.63 21.88,6.87 22.46,6Z" />
            </svg>
        </button>
        <button class="social-button" title="Instagram" onclick="window.location.href='https://www.instagram.com'">
            <svg viewBox="0 0 24 24">
                <path d="M7.8,2H16.2C19.4,2 22,4.6 22,7.8V16.2A5.8,5.8 0 0,1 16.2,22H7.8C4.6,22 2,19.4 2,16.2V7.8A5.8,5.8 0 0,1 7.8,2M7.6,4A3.6,3.6 0 0,0 4,7.6V16.4C4,18.39 5.61,20 7.6,20H16.4A3.6,3.6 0 0,0 20,16.4V7.6C20,5.61 18.39,4 16.4,4H7.6M17.25,5.5A1.25,1.25 0 0,1 18.5,6.75A1.25,1.25 0 0,1 17.25,8A1.25,1.25 0 0,1 16,6.75A1.25,1.25 0 0,1 17.25,5.5M12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9Z" />
            </svg>
        </button>
    </div>
    <script>
        function login(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            // Validación simple de ejemplo
            if (username === 'admin' && password === 'admin') {
                window.location.href = 'index.html';
            } else {
                errorMessage.style.display = 'block'; // Mostrar mensaje de error
            }
        }
    </script>
</body>
</html>
