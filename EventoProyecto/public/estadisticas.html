<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Pacifico&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffebee;
            background-image: url('fondo6.jpg'); /* Agregar imagen de fondo */
            background-size: cover; /* Ajustar la imagen para cubrir todo el fondo */
            background-position: center; /* Centrar la imagen */
            margin: 0;
            padding: 0;
            color: #000; /* Cambiar el color de la letra a negro */
            overflow-x: hidden;
        }
        header {
            background-color: #d32f2f;
            color: #ffebee;
            text-align: center;
            padding: 1em 0;
            font-size: 2em;
            border-bottom: 4px solid #b71c1c;
            animation: fadeInDown 1s;
        }
        .container {
            max-width: 800px;
            margin: 2em auto;
            padding: 1em;
            background-color: #ffffff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            text-align: center;
            animation: fadeInUp 1s;
        }
        h1 {
            font-family: 'Pacifico', cursive;
            color: #000; /* Cambiar el color del título a negro */
        }
        h2 {
            color: #d32f2f;
        }
        .stats {
            text-align: left;
            margin-top: 1em;
        }
        .stats h3 {
            color: #d32f2f;
            margin-bottom: 0.5em;
        }
        .stats p {
            color: #000; /* Cambiar el color de la letra a negro */
            margin-bottom: 1em;
            padding: 0.5em;
            background-color: #f1f1f1;
            border-radius: 4px;
            animation: fadeIn 1s;
        }
        .stats p span {
            font-weight: bold;
            color: #d32f2f;
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        #graficaContainer {
            max-height: 0;
            opacity: 0; /* Ocultar inicialmente */
            overflow: hidden;
            transition: max-height 0.5s ease-in-out, opacity 0.5s ease-in-out;
        }
        #graficaContainer.mostrar {
            max-height: 500px; /* Altura suficiente para mostrar la gráfica */
            opacity: 1; /* Hacer visible */
        }
        #mostrarGraficaBtn {
            background-color: #d32f2f;
            color: white;
            padding: 0.5em 1em; /* Reducir el tamaño del botón */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em; /* Reducir el tamaño de la fuente */
            transition: background-color 0.3s, transform 0.3s;
            margin-bottom: 1em;
            width: auto; /* Ajustar al contenido */
        }

        #mostrarGraficaBtn:hover {
            background-color: #b71c1c;
            transform: scale(1.05);
        }

        #graficaContainer canvas {
            width: 100%; /* Aumentar el ancho de la gráfica */
                max-width: 600px; /* Limitar el ancho máximo */
            height: 300px; /* Aumentar la altura de la gráfica */
            margin: 0 auto; /* Centrar la gráfica */
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Importar Chart.js -->
</head>
<body>
    <header>
        <h1>Estadísticas</h1>
    </header>
    <div class="container">
        <h2>Estadísticas de Eventos</h2>
        <div class="stats">
            <h3>Total de Eventos:</h3>
            <p id="totalEventos"><span>0</span></p>
            <h3>Tipos de Eventos:</h3>
            <p id="tiposEventos"><span>Conferencia:</span> 0, <span>Taller:</span> 0, <span>Seminario:</span> 0, <span>Otro:</span> 0</p>
            <h3>Fechas de Eventos:</h3>
            <p id="fechasEventos">No hay eventos registrados</p>
        </div>
        <button id="mostrarGraficaBtn">
            Gráfica
        </button>
        <div id="graficaContainer">
            <canvas id="eventosPorMes" width="400" height="200"></canvas> <!-- Contenedor de la gráfica -->
        </div>
    </div>
    <script>
        // Ejemplo de datos de eventos
        const eventos = [
            { nombre: "Evento 1", tipo: "conferencia", fecha: "2023-10-01" },
            { nombre: "Evento 2", tipo: "taller", fecha: "2023-10-05" },
            // ...otros eventos...
        ];

        // Función para actualizar estadísticas
        function actualizarEstadisticas() {
            const totalEventos = eventos.length;
            const tiposEventos = eventos.reduce((acc, evento) => {
                acc[evento.tipo] = (acc[evento.tipo] || 0) + 1;
                return acc;
            }, {});

            const fechasEventos = eventos.map(evento => evento.fecha).join(", ");

            document.getElementById("totalEventos").innerHTML = `<span>${totalEventos}</span>`;
            document.getElementById("tiposEventos").innerHTML = `<span>Conferencia:</span> ${tiposEventos.conferencia || 0}, <span>Taller:</span> ${tiposEventos.taller || 0}, <span>Seminario:</span> ${tiposEventos.seminario || 0}, <span>Otro:</span> ${tiposEventos.otro || 0}`;
            document.getElementById("fechasEventos").textContent = fechasEventos || "No hay eventos registrados";
        }

        function obtenerEventosPorMes(eventos) {
            const meses = [
                "Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio",
                "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"
            ];
            const eventosPorMes = new Array(12).fill(0);

            eventos.forEach(evento => {
                const mes = new Date(evento.fecha).getMonth();
                eventosPorMes[mes]++;
            });

            return { meses, eventosPorMes };
        }

        let grafica; // Variable para almacenar la gráfica

        document.getElementById('mostrarGraficaBtn').addEventListener('click', () => {
            const graficaContainer = document.getElementById('graficaContainer');
            graficaContainer.classList.toggle('mostrar'); // Alternar la clase para mostrar/ocultar

            if (graficaContainer.classList.contains('mostrar')) {
                if (!grafica) {
                    setTimeout(() => {
                        generarGrafica(); // Generar la gráfica después de la animación
                    }, 500); // Esperar a que termine la animación
                }
            }
        });

        function generarGrafica() {
            const { meses, eventosPorMes } = obtenerEventosPorMes(eventos);

            const ctx = document.getElementById('eventosPorMes').getContext('2d');
            grafica = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: meses,
                    datasets: [{
                        label: 'Eventos Totales',
                        data: eventosPorMes,
                        backgroundColor: 'rgba(211, 47, 47, 0.5)',
                        borderColor: 'rgba(211, 47, 47, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // Permitir que la gráfica se ajuste al contenedor
                    scales: {
                        y: {
                            beginAtZero: true,
                            max: 50 // Establecer el valor máximo de la escala en 50
                        }
                    }
                }
            });
        }

        // Actualizar estadísticas al cargar la página
        actualizarEstadisticas();
    </script>
</body>
</html>
