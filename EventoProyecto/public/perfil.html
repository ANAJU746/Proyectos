<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <style>
        @import url("https://fonts.googleapis.com/css?family=Montserrat:700");

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            display: flex;
        }
        .hero {
            background-color: #ffffff;
            position: relative;
            height: 100vh;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            flex: 1;
        }
        .hero .content {
            position: relative;
            z-index: 2;
            padding: 20px;
        }
        .cube {
            position: absolute;
            top: 80vh;
            left: 45vw;
            width: 10px;
            height: 10px;
            border: solid 1px #dc3545;
            transform-origin: top left;
            transform: scale(0) rotate(0deg) translate(-50%, -50%);
            animation: cube 12s ease-in forwards infinite;
        }
        .cube:nth-child(2n) {
            border-color: #b02a37;
        }
        .cube:nth-child(2) {
            animation-delay: 2s;
            left: 25vw;
            top: 40vh;
        }
        .cube:nth-child(3) {
            animation-delay: 4s;
            left: 75vw;
            top: 50vh;
        }
        .cube:nth-child(4) {
            animation-delay: 6s;
            left: 90vw;
            top: 10vh;
        }
        .cube:nth-child(5) {
            animation-delay: 8s;
            left: 10vw;
            top: 85vh;
        }
        .cube:nth-child(6) {
            animation-delay: 10s;
            left: 50vw;
            top: 10vh;
        }
        @keyframes cube {
            from {
                transform: scale(0) rotate(0deg) translate(-50%, -50%);
                opacity: 1;
            }
            to {
                transform: scale(20) rotate(960deg) translate(-50%, -50%);
                opacity: 0;
            }
        }
        .menu {
            position: relative;
            width: 200px;
            background-color: #dc3545;
            color: white;
            padding: 10px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.1);
            z-index: 3;
        }
        .menu button {
            width: 100%;
            padding: 10px;
            background-color: #b02a37;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .menu button:hover {
            background-color: #8a1f2b;
        }
        .submenu {
            display: flex;
            flex-direction: column;
            margin-top: 10px;
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .menu.active .submenu {
            opacity: 1;
            transform: translateY(0);
        }
        .submenu button {
            margin-bottom: 5px;
            animation: fadeIn 0.5s ease forwards;
        }
        .submenu button:nth-child(1) {
            animation-delay: 0.1s;
        }
        .submenu button:nth-child(2) {
            animation-delay: 0.2s;
        }
        .submenu button:nth-child(3) {
            animation-delay: 0.3s;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .menu.active .submenu {
            display: flex;
        }
        h1 {
            text-align: center;
            margin-top: 0; /* Alinear con la ventana */
            color: #dc3545;
        }
        .profile-picture {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
            position: relative;
        }
        .profile-picture img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #dc3545;
            object-fit: cover;
            cursor: pointer;

        }
        .profile-picture input[type="file"] {
            display: none;
        }
        .profile-picture span {
            margin-top: 10px;
            font-size: 14px;
            color: #555;
            text-align: center;
        }
        form {
            max-width: 450px;
            margin: 30px auto;
            padding: 25px;
            border-radius: 12px;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background-color: #f9f9f9;
            transition: border-color 0.3s ease;
        }
        input:focus, textarea:focus, select:focus {
            border-color: #dc3545;
            outline: none;
        }
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button[type="submit"]:hover {
            background-color: #b02a37;
        }
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .menu {
                width: 100%;
                height: auto;
                box-shadow: none;
            }
            .hero {
                height: auto;
            }
        }
        .hidden {
            display: none;
        }
        .modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff; /* Fondo blanco */
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            width: 400px;
            z-index: 1000;
            text-align: center;
            color: #333; /* Texto oscuro */
        }

        .modal .profile-picture {
            margin-bottom: 20px;
        }

        .modal .profile-picture img {
            border: 3px solid #d32f2f; /* Borde rojo */
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #e2e2e2; /* Fondo blanco */
            z-index: 999;
            overflow: hidden;
        }

        .overlay::before,
        .overlay::after {
            content: '';
            position: absolute;
            width: 150px;
            height: 150px;
            border: 5px solid rgba(211, 47, 47, 0.3);
            border-radius: 8px;
            animation: float 6s infinite ease-in-out;
        }

        .overlay::before {
            top: 10%;
            left: 20%;
            animation-delay: 0s;
        }

        .overlay::after {
            bottom: 15%;
            right: 25%;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }
    </style>
    <script>
        function cambiarFoto(event) {
            const input = event.target;
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const fotoPerfil = document.querySelectorAll('#fotoPerfil');
                    fotoPerfil.forEach(img => img.src = e.target.result); // Actualizar todas las instancias de la foto
                };
                reader.readAsDataURL(file);
            }
        }

        function mostrarFormulario(formularioId) {
            document.getElementById('formularioInformacion').classList.add('hidden');
            document.getElementById('formularioPerfil').classList.add('hidden');
            document.getElementById('formularioSeguridad').classList.add('hidden');
            document.getElementById(formularioId).classList.remove('hidden');
        }

        function toggleMenu() {
            const menu = document.querySelector('.menu');
            menu.classList.toggle('active');
        }
    </script>
</head>
<body>
    <div class="menu">
        <button onclick="toggleMenu()">Menú</button>
        <div class="submenu">
            <button onclick="mostrarFormulario('formularioInformacion')">Información</button>
            <button onclick="mostrarFormulario('formularioPerfil')">Cuenta</button>
            <button onclick="mostrarFormulario('formularioSeguridad')">Seguridad</button>
        </div>
    </div>
    <div class="hero">
        <div class="content">
            <h1>Perfil</h1>
            <div id="formularioInformacion" class="hidden" style="background-color: #dc3545; color: white; padding: 20px; border-radius: 12px;">
                <div class="overlay"></div>
                <div class="modal">
                    <h1>Perfil</h1>
                    <div class="profile-picture">
                        <img src="#" id="fotoPerfil" alt="Foto de perfil">
                    </div>
                    <div>
                        <p><strong>Nombre:</strong> <span id="infoNombre">Juan</span></p>
                        <p><strong>Apellido:</strong> <span id="infoApellido">Pérez</span></p>
                        <p><strong>Correo Electrónico:</strong> <span id="infoEmail">juan.perez@example.com</span></p>
                        <p><strong>Teléfono:</strong> <span id="infoTelefono">1234567890</span></p>
                        <p><strong>Dirección:</strong> <span id="infoDireccion">Calle Falsa 123</span></p>
                        <p><strong>Género:</strong> <span id="infoGenero">Masculino</span></p>
                    </div>
                </div>
            </div>
            <div id="formularioPerfil">
                <div class="profile-picture">
                    <img src="#" id="fotoPerfil" title="Foto" onclick="document.getElementById('inputFoto').click()">
                    <input type="file" id="inputFoto" accept="image/*" onchange="cambiarFoto(event)">
                    <span>Haz clic para cambiar tu foto</span>
                </div>
                <form action="#" method="post">
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>

                    <label for="apellido">Apellido:</label>
                    <input type="text" id="apellido" name="apellido" placeholder="Ingresa tu apellido" required>

                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="Ingresa tu correo electrónico" required>

                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="Ingresa tu número de teléfono">

                    <label for="direccion">Dirección:</label>
                    <textarea id="direccion" name="direccion" rows="3" placeholder="Ingresa tu dirección"></textarea>

                    <label for="genero">Género:</label>
                    <select id="genero" name="genero">
                        <option value="masculino">Masculino</option>
                        <option value="femenino">Femenino</option>
                        <option value="otro">Otro</option>
                    </select>

                    <button type="submit">Guardar Perfil</button>
                </form>
            </div>
            <div id="formularioSeguridad" class="hidden">
                <form action="#" method="post">
                    <label for="nuevoCorreo">Nuevo Correo Electrónico:</label>
                    <input type="email" id="nuevoCorreo" name="nuevoCorreo" placeholder="Ingresa tu nuevo correo" required>

                    <label for="contraseñaActual">Contraseña Actual:</label>
                    <input type="password" id="contraseñaActual" name="contraseñaActual" placeholder="Ingresa tu contraseña actual" required>

                    <label for="nuevaContraseña">Nueva Contraseña:</label>
                    <input type="password" id="nuevaContraseña" name="nuevaContraseña" placeholder="Ingresa tu nueva contraseña" required>

                    <label for="confirmarContraseña">Confirmar Nueva Contraseña:</label>
                    <input type="password" id="confirmarContraseña" name="confirmarContraseña" placeholder="Confirma tu nueva contraseña" required>

                    <button type="submit">Actualizar Seguridad</button>
                </form>
            </div>
        </div>
        
    </div>
</body>
</html>
